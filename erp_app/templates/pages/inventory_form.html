{% extends "base.html" %}
{% block title %}Miscare Stoc - ERP{% endblock %}
{% block content %}
<div class="page-header"><h1>Miscare Stoc Noua</h1></div>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>Produs *</label>
                    <select name="product_id" class="form-control" required>
                        <option value="">Selecteaza produs</option>
                        {% for p in products %}
                        <option value="{{ p.id }}">{{ p.code }} - {{ p.name }} (stoc: {{ p.stock_quantity }} {{ p.unit }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Tip miscare *</label>
                    <select name="movement_type" class="form-control" required>
                        <option value="in">Intrare (receptie)</option>
                        <option value="out">Iesire (livrare)</option>
                        <option value="adjustment">Ajustare (inventar)</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Cantitate *</label>
                    <input type="number" name="quantity" class="form-control" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Referinta (nr. comanda/factura)</label>
                    <input type="text" name="reference" class="form-control">
                </div>
            </div>
            <div class="form-group">
                <label>Note</label>
                <textarea name="notes" class="form-control"></textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Inregistreaza</button>
                <a href="{{ url_for('inventory.list_movements') }}" class="btn btn-outline">Anuleaza</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
