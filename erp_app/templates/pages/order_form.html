{% extends "base.html" %}
{% block title %}Comanda Noua - ERP{% endblock %}
{% block content %}
<div class="page-header"><h1>Comanda Noua</h1></div>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>Nr. Comanda</label>
                    <input type="text" class="form-control" value="{{ order_number }}" disabled>
                </div>
                <div class="form-group">
                    <label>Client *</label>
                    <select name="client_id" class="form-control" required>
                        <option value="">Selecteaza client</option>
                        {% for c in clients %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" name="date" class="form-control">
                </div>
                <div class="form-group">
                    <label>Data livrare</label>
                    <input type="date" name="delivery_date" class="form-control">
                </div>
            </div>
            <h3 style="margin:20px 0 10px">Produse</h3>
            <div id="items-container">
                <div class="item-row form-row">
                    <div class="form-group">
                        <label>Produs</label>
                        <select name="item_product_id[]" class="form-control" required>
                            <option value="">Selecteaza</option>
                            {% for p in products %}
                            <option value="{{ p.id }}" data-price="{{ p.price }}">{{ p.code }} - {{ p.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cantitate</label>
                        <input type="number" name="item_quantity[]" class="form-control" step="0.01" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>Pret unitar</label>
                        <input type="number" name="item_price[]" class="form-control" step="0.01" required>
                    </div>
                </div>
            </div>
            <button type="button" class="btn btn-outline btn-sm" onclick="addOrderItemRow()" style="margin:10px 0 20px">+ Adauga produs</button>
            <div class="form-group">
                <label>Observatii</label>
                <textarea name="notes" class="form-control"></textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Salveaza Comanda</button>
                <a href="{{ url_for('orders.list_orders') }}" class="btn btn-outline">Anuleaza</a>
            </div>
        </form>
    </div>
</div>
{% block scripts %}
<script>
function addOrderItemRow() {
    var container = document.getElementById('items-container');
    var firstSelect = container.querySelector('select[name="item_product_id[]"]');
    var row = document.createElement('div');
    row.className = 'item-row form-row';
    row.innerHTML =
        '<div class="form-group"><select name="item_product_id[]" class="form-control" required>' +
        firstSelect.innerHTML + '</select></div>' +
        '<div class="form-group"><input type="number" name="item_quantity[]" class="form-control" step="0.01" value="1" required></div>' +
        '<div class="form-group"><input type="number" name="item_price[]" class="form-control" step="0.01" required></div>' +
        '<div class="form-group" style="align-self:end"><button type="button" class="btn btn-danger btn-sm" onclick="this.closest(\'.item-row\').remove()">X</button></div>';
    container.appendChild(row);
}
</script>
{% endblock %}
{% endblock %}
