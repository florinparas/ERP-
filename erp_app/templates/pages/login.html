{% extends "base.html" %}
{% block title %}Login - ERP{% endblock %}
{% block content %}
<div class="login-box">
    <h1>ERP System</h1>
    <form method="POST">
        <div class="form-group">
            <label>Utilizator</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label>Parola</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Autentificare</button>
    </form>
    <p style="text-align:center; margin-top:15px; font-size:0.85rem">
        <a href="{{ url_for('auth.register') }}">Creeaza cont nou</a>
    </p>
</div>
{% endblock %}
