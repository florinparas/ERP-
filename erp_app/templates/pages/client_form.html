{% extends "base.html" %}
{% block title %}{{ 'Editare' if client else 'Adaugare' }} Client - ERP{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ 'Editare Client' if client else 'Client Nou' }}</h1>
</div>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>Nume *</label>
                    <input type="text" name="name" class="form-control" value="{{ client.name if client else '' }}" required>
                </div>
                <div class="form-group">
                    <label>Companie</label>
                    <input type="text" name="company" class="form-control" value="{{ client.company if client else '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" value="{{ client.email if client else '' }}">
                </div>
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="text" name="phone" class="form-control" value="{{ client.phone if client else '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>CUI</label>
                    <input type="text" name="cui" class="form-control" value="{{ client.cui if client else '' }}">
                </div>
                <div class="form-group">
                    <label>Oras</label>
                    <input type="text" name="city" class="form-control" value="{{ client.city if client else '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tara</label>
                    <input type="text" name="country" class="form-control" value="{{ client.country if client else 'Romania' }}">
                </div>
            </div>
            <div class="form-group">
                <label>Adresa</label>
                <textarea name="address" class="form-control">{{ client.address if client else '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Note</label>
                <textarea name="notes" class="form-control">{{ client.notes if client else '' }}</textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Salveaza</button>
                <a href="{{ url_for('clients.list_clients') }}" class="btn btn-outline">Anuleaza</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
