{% extends "base.html" %}
{% block title %}{{ 'Editare' if product else 'Adaugare' }} Produs - ERP{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ 'Editare Produs' if product else 'Produs Nou' }}</h1>
</div>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>Cod Produs *</label>
                    <input type="text" name="code" class="form-control" value="{{ product.code if product else '' }}" required>
                </div>
                <div class="form-group">
                    <label>Nume *</label>
                    <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Categorie</label>
                    <input type="text" name="category" class="form-control" value="{{ product.category if product else '' }}">
                </div>
                <div class="form-group">
                    <label>Unitate de masura</label>
                    <select name="unit" class="form-control">
                        {% for u in ['buc', 'kg', 'l', 'm', 'mp', 'set'] %}
                        <option value="{{ u }}" {% if product and product.unit == u %}selected{% endif %}>{{ u }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Pret vanzare (RON)</label>
                    <input type="number" name="price" class="form-control" step="0.01" value="{{ product.price if product else 0 }}">
                </div>
                <div class="form-group">
                    <label>Cost (RON)</label>
                    <input type="number" name="cost" class="form-control" step="0.01" value="{{ product.cost if product else 0 }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>TVA (%)</label>
                    <input type="number" name="vat_rate" class="form-control" step="0.1" value="{{ product.vat_rate if product else 19 }}">
                </div>
                <div class="form-group">
                    <label>Stoc minim</label>
                    <input type="number" name="min_stock" class="form-control" step="0.01" value="{{ product.min_stock if product else 0 }}">
                </div>
            </div>
            {% if not product %}
            <div class="form-group">
                <label>Stoc initial</label>
                <input type="number" name="stock_quantity" class="form-control" step="0.01" value="0">
            </div>
            {% endif %}
            <div class="form-group">
                <label>Descriere</label>
                <textarea name="description" class="form-control">{{ product.description if product else '' }}</textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Salveaza</button>
                <a href="{{ url_for('products.list_products') }}" class="btn btn-outline">Anuleaza</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
