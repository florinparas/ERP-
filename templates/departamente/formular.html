{% extends "base.html" %}
{% block title %}{{ 'Editare' if departament else 'Adăugare' }} Departament{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-diagram-3"></i> {{ 'Editare' if departament else 'Adăugare' }} Departament</h2>
</div>

<div class="form-container">
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="nume" class="form-label">Nume Departament *</label>
                <input type="text" class="form-control" id="nume" name="nume"
                       value="{{ departament.nume if departament else '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="cod" class="form-label">Cod</label>
                <input type="text" class="form-control" id="cod" name="cod"
                       value="{{ departament.cod if departament else '' }}" placeholder="ex: IT, HR, FIN">
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="manager_id" class="form-label">Manager</label>
                <select class="form-select" id="manager_id" name="manager_id">
                    <option value="">-- Selectați --</option>
                    {% for a in angajati %}
                    <option value="{{ a.id }}" {% if departament and departament.manager_id == a.id %}selected{% endif %}>
                        {{ a.nume }} {{ a.prenume }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label for="parinte_id" class="form-label">Departament Părinte</label>
                <select class="form-select" id="parinte_id" name="parinte_id">
                    <option value="">-- Niciun părinte --</option>
                    {% for d in departamente %}
                    <option value="{{ d.id }}" {% if departament and departament.parinte_id == d.id %}selected{% endif %}>
                        {{ d.nume }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label for="descriere" class="form-label">Descriere</label>
            <textarea class="form-control" id="descriere" name="descriere" rows="3">{{ departament.descriere if departament else '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle"></i> {{ 'Actualizare' if departament else 'Adăugare' }}
            </button>
            <a href="{{ url_for('departamente.lista') }}" class="btn btn-secondary">Anulare</a>
        </div>
    </form>
</div>
{% endblock %}
