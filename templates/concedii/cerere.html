{% extends "base.html" %}
{% block title %}Cerere Concediu{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-calendar-plus"></i> Cerere Concediu Nouă</h2>
</div>

<div class="form-container">
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="angajat_id" class="form-label">Angajat *</label>
                <select class="form-select" id="angajat_id" name="angajat_id" required>
                    <option value="">-- Selectați --</option>
                    {% for a in angajati %}
                    <option value="{{ a.id }}">{{ a.nume }} {{ a.prenume }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label for="tip_concediu" class="form-label">Tip Concediu *</label>
                <select class="form-select" id="tip_concediu" name="tip_concediu" required>
                    {% for tip in tip_choices %}
                    <option value="{{ tip }}">{{ tip }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="data_inceput" class="form-label">Data Început *</label>
                <input type="date" class="form-control" id="data_inceput" name="data_inceput" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="data_sfarsit" class="form-label">Data Sfârșit *</label>
                <input type="date" class="form-control" id="data_sfarsit" name="data_sfarsit" required>
            </div>
        </div>
        <div class="mb-3">
            <label for="motiv" class="form-label">Motiv / Observații</label>
            <textarea class="form-control" id="motiv" name="motiv" rows="3"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-send"></i> Trimite Cerere
            </button>
            <a href="{{ url_for('concedii.lista') }}" class="btn btn-secondary">Anulare</a>
        </div>
    </form>
</div>
{% endblock %}
